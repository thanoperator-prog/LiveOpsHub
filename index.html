<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LiveOps Hub - Brand Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');body{font-family:'Inter',sans-serif}@keyframes slideDown{from{transform:translateY(-10%);opacity:0}to{transform:translateY(0);opacity:1}}.animate-slideDown{animation:slideDown .2s ease-out forwards}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}::-webkit-scrollbar-thumb:hover{background:#94a3b8}</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-blue-100 selection:text-blue-900">
<div id="app" class="h-screen w-full flex flex-col overflow-hidden" @click="initializeAudio()">

<div class="fixed top-4 left-1/2 -translate-x-1/2 z-[200] flex flex-col items-center gap-2 pointer-events-none w-full max-w-md px-4">
<template v-for="notif in activeNotifications" :key="notif.id"><div class="pointer-events-auto w-full flex flex-col p-3 rounded-xl shadow-2xl border animate-slideDown bg-white" :class="notif.type==='critical'?'border-red-500':'border-amber-500'"><div class="flex items-center justify-between mb-2"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" :class="notif.type==='critical'?'bg-red-100 text-red-600':'bg-amber-100 text-amber-600'"><svg v-if="notif.type==='critical'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><svg v-else xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><p class="text-sm font-bold text-slate-900 leading-tight">{{notif.message}}</p><p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">{{notif.brandName}}</p></div></div><button @click.stop="dismissNotification(notif.id)" class="p-1.5 rounded-full hover:bg-slate-100 text-slate-400 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="flex gap-2"><button @click.stop="navigateToTask(notif.brandId, notif.taskId); dismissNotification(notif.id)" class="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs font-bold py-1.5 rounded-lg border border-blue-200 transition-colors">View Task</button><template v-if="!notif.isEndorsed"><button @click.stop="snoozeTask(notif.taskId, 5); dismissNotification(notif.id)" class="flex-1 bg-amber-50 hover:bg-amber-100 text-amber-700 text-xs font-bold py-1.5 rounded-lg border border-amber-200 transition-colors">On it (5m)</button><button @click.stop="snoozeTask(notif.taskId, 15); dismissNotification(notif.id)" class="flex-1 bg-amber-50 hover:bg-amber-100 text-amber-700 text-xs font-bold py-1.5 rounded-lg border border-amber-200 transition-colors">On it (15m)</button></template></div></div></template>
</div>

<template v-if="!currentUser"><div class="flex-1 flex flex-col items-center justify-center p-4 relative"><div v-if="!isDbReady" class="absolute inset-0 bg-slate-50/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center"><svg class="animate-spin h-10 w-10 text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><p class="text-sm font-bold text-slate-500 uppercase tracking-widest animate-pulse">Establishing Secure Uplink</p></div><div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden"><div class="bg-blue-600 p-8 text-center flex flex-col items-center"><div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center text-white mb-4 backdrop-blur-sm shadow-inner"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><h1 class="text-2xl font-black text-white tracking-tight">LiveOps Hub</h1><p class="text-blue-100 text-xs font-bold uppercase tracking-wider mt-1">Brand Monitor</p></div><div class="p-8"><h2 class="text-lg font-bold text-slate-800 mb-6 text-center">Sign in to your account</h2><div v-if="loginError" class="bg-red-50 text-red-600 border border-red-200 text-sm font-semibold rounded-lg p-3 mb-5 flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>{{loginError}}</div><form @submit.prevent="handleLogin" class="space-y-5"><div><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Username</label><input type="text" v-model="loginForm.username" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2.5 text-sm font-semibold text-slate-800 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" placeholder="username"></div><div><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Password</label><div class="relative"><input :type="showLoginPwd?'text':'password'" v-model="loginForm.password" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2.5 text-sm font-semibold text-slate-800 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all pr-10" placeholder="password"><button type="button" @click="showLoginPwd=!showLoginPwd" class="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600 transition-colors"><svg v-if="showLoginPwd" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg v-else xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button></div></div><button type="submit" :disabled="!isDbReady" class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-bold py-3 rounded-lg shadow-md transition-colors mt-2">Access Hub</button></form></div></div></div></template>
<template v-else>
<div v-if="currentUser?.forcePasswordChange" class="fixed inset-0 z-[1000] bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden animate-slideDown border border-slate-200">
        <div class="h-2 bg-blue-600 w-full"></div>
        <div class="p-6">
            <h2 class="text-xl font-black text-slate-900 mb-2">Welcome to LiveOps!</h2>
            <p class="text-sm text-slate-600 mb-6 leading-relaxed">Since this is your first time logging in, please set a new secure password to continue.</p>
            <div v-if="forcePwdError" class="bg-red-50 text-red-600 border border-red-200 text-xs font-bold p-3 rounded mb-4">{{forcePwdError}}</div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">New Password</label>
                    <input type="password" v-model="forcePwdForm.newPwd" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 text-sm font-semibold focus:border-blue-500 outline-none text-slate-800 shadow-sm" placeholder="Enter new password">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Confirm Password</label>
                    <input type="password" v-model="forcePwdForm.confirmPwd" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 text-sm font-semibold focus:border-blue-500 outline-none text-slate-800 shadow-sm" placeholder="Re-type new password">
                </div>
            </div>
            <button @click="promptForcePasswordChange" :disabled="!forcePwdForm.newPwd || !forcePwdForm.confirmPwd" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mt-6 shadow-md hover:bg-blue-700 disabled:opacity-50 transition-colors">Set Password & Continue</button>
        </div>
    </div>
</div>

<div class="flex-1 flex w-full overflow-hidden relative"><aside :class="isSidebarExpanded?'w-64':'w-20'" class="bg-slate-900 flex flex-col transition-all duration-300 z-30 shrink-0 relative shadow-xl"><button @click="isSidebarExpanded=!isSidebarExpanded" class="absolute -right-3 top-6 w-6 h-6 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-600 hover:text-blue-600 shadow-md z-40 transition-transform" :class="!isSidebarExpanded?'rotate-180':''"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button><div class="h-16 flex items-center px-4 border-b border-slate-800 shrink-0 overflow-hidden"><div class="flex items-center gap-3 w-full"><div class="w-10 h-10 shrink-0 rounded-lg bg-blue-600 flex items-center justify-center text-white shadow-sm"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><div class="whitespace-nowrap transition-opacity duration-200" :class="!isSidebarExpanded?'opacity-0 w-0':''"><h1 class="text-base font-black text-white tracking-tight leading-tight">LiveOps Hub</h1><p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Brand Monitor</p></div></div></div><nav class="flex-1 px-3 py-6 space-y-2 overflow-y-auto overflow-x-hidden"><button @click="activeTab='dashboard';selectedBrandId=null;" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors" :class="activeTab==='dashboard'?'bg-blue-600 text-white shadow-md':'text-slate-400 hover:bg-slate-800 hover:text-white'"><div class="w-6 flex justify-center shrink-0"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></div><span class="whitespace-nowrap font-semibold text-sm transition-opacity duration-200" :class="!isSidebarExpanded?'opacity-0':''">Metrics Dashboard</span></button><button @click="activeTab='brands';selectedBrandId=null;" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors" :class="activeTab==='brands'?'bg-blue-600 text-white shadow-md':'text-slate-400 hover:bg-slate-800 hover:text-white'"><div class="w-6 flex justify-center shrink-0 relative"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg><div v-if="activeIssuesCount>0&&!isSidebarExpanded" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-slate-900"></div></div><span class="whitespace-nowrap font-semibold text-sm transition-opacity duration-200 flex-1 text-left" :class="!isSidebarExpanded?'opacity-0':''">TikTok Shop Partners</span><span v-if="activeIssuesCount>0&&isSidebarExpanded" class="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full shadow-sm">{{activeIssuesCount}}</span></button><button @click="activeTab='settings';selectedBrandId=null;profileForm.name=currentUser.name;" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors" :class="activeTab==='settings'?'bg-blue-600 text-white shadow-md':'text-slate-400 hover:bg-slate-800 hover:text-white'"><div class="w-6 flex justify-center shrink-0"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></div><span class="whitespace-nowrap font-semibold text-sm transition-opacity duration-200" :class="!isSidebarExpanded?'opacity-0':''">Settings</span></button></nav><div class="p-4 border-t border-slate-800 flex flex-col gap-4 overflow-hidden shrink-0"><div class="flex items-center gap-3"><div class="w-10 h-10 shrink-0 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 text-slate-200 font-bold text-sm shadow-inner relative">{{getInitials(currentUser?.name||'')}}<div v-if="currentUser?.accountStatus==='Suspended'" class="absolute -top-1 -right-1 w-3 h-3 bg-amber-500 border-2 border-slate-800 rounded-full" title="Account Suspended"></div></div><div class="flex-1 min-w-0 transition-opacity duration-200" :class="!isSidebarExpanded?'opacity-0':''"><div class="text-xs font-bold text-white truncate">{{currentUser?.name}}</div><div class="text-[9px] font-bold uppercase tracking-wider text-blue-400 truncate">{{getRoleName(currentUser?.role)}}</div></div></div><button @click="promptLogout" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-red-400 transition-colors" :class="!isSidebarExpanded?'justify-center':''" title="Logout"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span class="text-xs font-bold whitespace-nowrap transition-opacity duration-200" :class="!isSidebarExpanded?'opacity-0 hidden':''">Sign Out</span></button></div></aside>
<div class="flex-1 flex flex-col min-w-0 relative"><header class="bg-white/80 backdrop-blur-md border-b border-slate-200 h-14 flex items-center justify-end px-6 shrink-0 z-10 sticky top-0"><div class="flex items-center gap-2"><div class="text-sm font-bold text-slate-800 tracking-wide">{{formatDate(currentTime).time}}</div><div class="h-4 w-px bg-slate-300"></div><div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">{{formatDate(currentTime).date}}</div></div></header><div v-if="currentUser?.accountStatus==='Suspended'" class="bg-amber-100 text-amber-800 border-b border-amber-200 px-6 py-2 text-xs font-bold flex items-center justify-center gap-2 shadow-inner"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>YOUR ACCOUNT IS CURRENTLY SUSPENDED. YOU ARE IN VIEW-ONLY MODE.</div>
<main class="flex-1 overflow-auto relative p-6 md:p-8"><template v-if="activeTab==='dashboard'"><div class="w-full max-w-7xl mx-auto space-y-8"><div class="mb-2"><h2 class="text-2xl font-bold text-slate-900 mb-1 tracking-tight">Dashboard</h2><p class="text-sm text-slate-500">Real-time operational statistics and historical data.</p></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"><div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm flex items-center justify-between"><div><p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Active Partners</p><h3 class="text-3xl font-black text-slate-800">{{stats.totalBrands}}</h3></div><div class="w-12 h-12 bg-slate-50 text-slate-600 rounded-lg flex items-center justify-center border border-slate-200"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></div></div><div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm flex items-center justify-between relative overflow-hidden"><div class="absolute bottom-0 left-0 w-full h-1 bg-emerald-400"></div><div><p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Operational</p><h3 class="text-3xl font-black text-emerald-600">{{stats.normalBrands}}</h3></div><div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-lg flex items-center justify-center border border-emerald-100"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div></div><div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm flex items-center justify-between relative overflow-hidden"><div class="absolute bottom-0 left-0 w-full h-1" :class="stats.unresolvedLogs>0?'bg-amber-400':'bg-slate-200'"></div><div><p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Open Tickets</p><h3 class="text-3xl font-black" :class="stats.unresolvedLogs>0?'text-amber-600':'text-slate-800'">{{stats.unresolvedLogs}}</h3></div><div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-lg flex items-center justify-center border border-amber-100"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg></div></div><div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm flex items-center justify-between relative overflow-hidden"><div class="absolute bottom-0 left-0 w-full h-1 bg-blue-400"></div><div><p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Resolution Rate</p><h3 class="text-3xl font-black text-blue-600">{{stats.resolutionRate}}%</h3></div><div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center border border-blue-100"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg></div></div><div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm flex items-center justify-between relative overflow-hidden"><div class="absolute bottom-0 left-0 w-full h-1 bg-indigo-400"></div><div><p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Active Tasks</p><h3 class="text-3xl font-black text-indigo-600">{{stats.activeTasks}}</h3></div><div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center border border-indigo-100"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg></div></div><div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm flex items-center justify-between relative overflow-hidden"><div class="absolute bottom-0 left-0 w-full h-1 bg-purple-400"></div><div><p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Endorsed Tasks</p><h3 class="text-3xl font-black text-purple-600">{{stats.endorsedTasks}}</h3></div><div class="w-12 h-12 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center border border-purple-100"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-5.27l-3.26-1.61"></path></svg></div></div></div><div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm"><h3 class="text-sm font-bold text-slate-800 mb-4 uppercase tracking-wide">Floor Health Distribution</h3><div class="flex h-4 rounded-full overflow-hidden bg-slate-100 border border-slate-200 mb-4"><div class="bg-emerald-500 transition-all duration-500" :style="{width:stats.normalPct+'%'}" :title="'Normal: '+stats.normalBrands"></div><div class="bg-blue-400 transition-all duration-500" :style="{width:stats.pendingPct+'%'}" :title="'Pending: '+stats.pendingBrands"></div><div class="bg-amber-400 transition-all duration-500" :style="{width:stats.attentionPct+'%'}" :title="'Needs Attention: '+stats.attentionBrands"></div><div class="bg-red-500 transition-all duration-500" :style="{width:stats.criticalPct+'%'}" :title="'Critical: '+stats.criticalBrands"></div></div><div class="flex flex-wrap gap-6 text-xs font-semibold text-slate-600"><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-emerald-500 shadow-sm"></div>Normal ({{stats.normalPct}}%)</div><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-blue-400 shadow-sm"></div>Pending ({{stats.pendingPct}}%)</div><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-amber-400 shadow-sm"></div>Attention ({{stats.attentionPct}}%)</div><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-red-500 shadow-sm"></div>Critical ({{stats.criticalPct}}%)</div></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex flex-col max-h-96"><div class="p-5 border-b border-slate-200 bg-slate-50/50 shrink-0"><h3 class="text-sm font-bold text-slate-800 uppercase tracking-wide">Recent Incident Logs</h3></div><div class="divide-y divide-slate-100 overflow-y-auto flex-1"><template v-for="activity in recentActivities" :key="activity.id"><div @click="openBrandFromLog(activity.brandId)" class="p-4 hover:bg-slate-100 transition-colors flex items-start gap-4 cursor-pointer group"><div class="mt-1.5 w-2.5 h-2.5 rounded-full shrink-0 shadow-sm border border-white" :class="activity.isResolved?'bg-emerald-500':'bg-amber-500'"></div><div class="w-8 h-8 rounded shadow-sm border border-slate-200 shrink-0 bg-white flex items-center justify-center overflow-hidden"><img v-if="getBrandLogo(activity.brandId)" :src="getBrandLogo(activity.brandId)" class="w-full h-full object-cover"><span v-else class="text-[10px] font-bold text-slate-500">{{getInitials(getBrandName(activity.brandId))}}</span></div><div class="flex-1 min-w-0"><p class="text-xs text-slate-800 font-medium mb-1 group-hover:text-blue-600 transition-colors line-clamp-2">{{activity.message}}</p><div class="flex items-center gap-2 text-[10px] font-semibold text-slate-500 uppercase tracking-wider flex-wrap"><span class="text-blue-700 truncate max-w-[100px]">{{getBrandName(activity.brandId)}}</span><span>•</span><span>{{activity.author}}</span><span>•</span><span>{{formatDate(activity.timestamp).date}}</span></div></div></div></template><div v-if="recentActivities.length===0" class="p-8 text-center text-slate-500 font-medium">No recent incidents logged.</div></div></div><div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex flex-col max-h-96"><div class="p-5 border-b border-slate-200 bg-slate-50/50 shrink-0"><h3 class="text-sm font-bold text-slate-800 uppercase tracking-wide">Recent Task Updates</h3></div><div class="divide-y divide-slate-100 overflow-y-auto flex-1"><template v-for="log in recentTaskLogs" :key="log.id"><div @click="navigateToTask(log.brandId, log.taskId)" class="p-4 hover:bg-slate-100 transition-colors flex items-start gap-4 cursor-pointer group"><div class="mt-1.5 w-2.5 h-2.5 rounded-full shrink-0 shadow-sm border border-white bg-indigo-500"></div><div class="w-8 h-8 rounded shadow-sm border border-slate-200 shrink-0 bg-white flex items-center justify-center overflow-hidden"><img v-if="getBrandLogo(log.brandId)" :src="getBrandLogo(log.brandId)" class="w-full h-full object-cover"><span v-else class="text-[10px] font-bold text-slate-500">{{getInitials(getBrandName(log.brandId))}}</span></div><div class="flex-1 min-w-0"><p class="text-xs text-slate-800 font-medium mb-1 group-hover:text-indigo-600 transition-colors line-clamp-2 whitespace-pre-line">{{log.text}}</p><div class="flex items-center gap-2 text-[10px] font-semibold text-slate-500 uppercase tracking-wider flex-wrap"><span class="text-indigo-700 truncate max-w-[100px]">{{getBrandName(log.brandId)}}</span><span>•</span><span>{{log.author}}</span><span>•</span><span>{{formatDate(log.timestamp).date}}</span></div></div></div></template><div v-if="recentTaskLogs.length===0" class="p-8 text-center text-slate-500 font-medium">No recent task updates.</div></div></div></div></div></template>

<template v-else-if="activeTab==='brands'"><div class="w-full mx-auto relative"><div class="mb-8"><h2 class="text-2xl font-bold text-slate-900 tracking-tight mb-1">TikTok Shop Partners Roster</h2><p class="text-sm text-slate-500">Monitor individual brand status and manage pending endorsements for active contracts.</p></div><div class="flex flex-wrap gap-2 mb-8 bg-white p-2 rounded-lg border border-slate-200 shadow-sm inline-flex"><template v-for="filter in availableFilters" :key="filter"><button @click="currentFilter=filter;selectedBrandId=null;" class="px-4 py-1.5 rounded-md text-sm font-semibold transition-all duration-200" :class="currentFilter===filter?'bg-blue-600 text-white shadow':'bg-transparent text-slate-600 hover:bg-slate-100 hover:text-slate-900'">{{filter}} <span v-if="filter!=='All'&&filter!=='My Assigned Brands'&&filter!=='Action Needed'" class="ml-1 opacity-70">({{sortedBrandsActive.filter(b=>b.status===filter).length}})</span><span v-if="filter==='My Assigned Brands'" class="ml-1 opacity-70">({{currentUser?.assignedBrandIds?.length||0}})</span><span v-if="filter==='Action Needed'" class="ml-1 opacity-70">({{sortedBrandsActive.filter(b=>b.status==='Critical'||b.status==='Needs Attention').length}})</span></button></template></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4"><template v-for="brand in filteredBrands" :key="brand.id"><div @click="selectedBrandId=brand.id;brandPanelTab='records';recordSubTab='incidents';" class="group rounded-xl border p-3.5 cursor-pointer hover:shadow-md transition-all flex items-center gap-3 relative overflow-hidden" :class="getBrandCardBackground(brand.status)"><div class="w-10 h-10 rounded shadow-sm border border-white/50 shrink-0 flex items-center justify-center font-bold text-sm bg-white/60 text-slate-700 overflow-hidden"><img v-if="brand.logoBase64" :src="brand.logoBase64" class="w-full h-full object-cover"><span v-else>{{getInitials(brand.name)}}</span></div><div class="flex-1 min-w-0"><h2 class="text-[13px] font-bold text-slate-800 group-hover:text-blue-800 truncate transition-colors">{{brand.name}}</h2><div class="mt-0.5 flex items-center gap-1 flex-wrap"><span class="px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider border inline-block bg-white/60 shadow-sm" :class="getStatusBadgeClasses(brand.status)">{{brand.status}}</span><span v-if="getBrandIncompleteTaskCount(brand.id)>0" class="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider border inline-block bg-white/80 text-blue-800 border-blue-200 shadow-sm">{{getBrandIncompleteTaskCount(brand.id)}} Tasks</span><span v-if="getBrandEndorsedTaskCount(brand.id)>0" class="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider border inline-block bg-white/80 text-purple-800 border-purple-200 flex items-center gap-1 shadow-sm"><svg xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-5.27l-3.26-1.61"></path></svg> {{getBrandEndorsedTaskCount(brand.id)}} Endorsed</span></div></div><div v-if="getBrandTaskMetrics(brand.id).hasOverdue" class="absolute top-2 right-2 w-3 h-3 bg-red-500 rounded-full border-2 border-white shadow-sm animate-pulse" title="Overdue Task"></div><div v-else-if="getBrandTaskMetrics(brand.id).hasHandled" class="absolute top-2 right-2 w-3 h-3 bg-amber-400 rounded-full border-2 border-white shadow-sm flex items-center justify-center" title="Being Handled"><svg xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-amber-900"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div></div></template><div v-if="filteredBrands.length===0" class="col-span-full py-16 flex flex-col items-center justify-center text-slate-400 bg-white border border-slate-200 border-dashed rounded-xl"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" class="mb-4 opacity-50 text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p class="font-medium text-slate-600">No active brands match the current filter.</p></div></div></div></template>

<template v-else-if="activeTab==='settings'"><div class="w-full max-w-5xl mx-auto"><div class="mb-6"><h2 class="text-2xl font-bold text-slate-900 tracking-tight">System Configuration</h2><p class="text-sm text-slate-500">Manage your profile and system permissions.</p></div><div class="flex gap-4 border-b border-slate-200 mb-8 overflow-x-auto"><button @click="settingsView='profile'" :class="settingsView==='profile'?'border-blue-600 text-blue-700':'border-transparent text-slate-500 hover:text-slate-800'" class="pb-3 px-2 text-sm font-bold border-b-2 transition-colors whitespace-nowrap">My Profile</button><template v-if="isAdmin"><button @click="settingsView='brands'" :class="settingsView==='brands'?'border-blue-600 text-blue-700':'border-transparent text-slate-500 hover:text-slate-800'" class="pb-3 px-2 text-sm font-bold border-b-2 transition-colors whitespace-nowrap">Brand Directory</button><button @click="settingsView='users'" :class="settingsView==='users'?'border-blue-600 text-blue-700':'border-transparent text-slate-500 hover:text-slate-800'" class="pb-3 px-2 text-sm font-bold border-b-2 transition-colors flex items-center gap-2 whitespace-nowrap">User Management <span class="bg-blue-100 text-blue-700 text-[9px] px-1.5 py-0.5 rounded-full uppercase tracking-wider">Admin</span></button></template></div><template v-if="settingsView==='profile'"><div class="bg-white rounded-xl border border-slate-200 p-6 mb-8 shadow-sm relative overflow-hidden max-w-2xl"><div class="absolute top-0 left-0 w-1.5 h-full bg-slate-800"></div><h3 class="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="text-slate-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Account Settings</h3><div v-if="profileMessage" class="mb-5 p-3 rounded-lg text-sm font-bold border" :class="profileMessage.type==='success'?'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-red-50 text-red-700 border-red-200'">{{profileMessage.text}}</div><div class="space-y-5"><div><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Display Name</label><input v-model="profileForm.name" :disabled="currentUser?.accountStatus==='Suspended'" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 text-sm font-semibold focus:border-blue-500 outline-none text-slate-800 disabled:opacity-60 transition-all"></div><div class="grid grid-cols-1 md:grid-cols-2 gap-5"><div><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">New Password</label><div class="relative"><input :type="showProfileNewPwd?'text':'password'" v-model="profileForm.newPassword" :disabled="currentUser?.accountStatus==='Suspended'" placeholder="Leave blank" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 text-sm font-semibold focus:border-blue-500 outline-none text-slate-800 disabled:opacity-60 pr-10"><button type="button" @click="showProfileNewPwd=!showProfileNewPwd" class="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600 transition-colors"><svg v-if="showProfileNewPwd" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg v-else xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button></div></div><div><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Confirm Password</label><div class="relative"><input :type="showProfileConfirmPwd?'text':'password'" v-model="profileForm.confirmPassword" :disabled="currentUser?.accountStatus==='Suspended'" placeholder="Re-type password" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 text-sm font-semibold focus:border-blue-500 outline-none text-slate-800 disabled:opacity-60 pr-10"><button type="button" @click="showProfileConfirmPwd=!showProfileConfirmPwd" class="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600 transition-colors"><svg v-if="showProfileConfirmPwd" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg v-else xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button></div></div></div><div class="pt-2"><button @click="promptUpdateProfile" :disabled="currentUser?.accountStatus==='Suspended'" class="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white px-6 py-2.5 rounded-lg text-sm font-bold shadow-md transition-colors flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save Changes </button></div></div></div></template><template v-else-if="settingsView==='brands'"><div class="bg-white rounded-xl border border-slate-200 p-6 mb-8 shadow-sm relative overflow-hidden"><div class="absolute top-0 left-0 w-1.5 h-full bg-blue-600"></div><h3 class="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Register New Brand </h3><div class="flex flex-col md:flex-row gap-6 items-end"><div class="flex flex-col items-center gap-2"><div class="w-16 h-16 rounded-lg border-2 border-dashed border-slate-300 flex items-center justify-center bg-slate-50 overflow-hidden relative group cursor-pointer"><img v-if="newBrand.logoBase64" :src="newBrand.logoBase64" class="w-full h-full object-cover"><svg v-else xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><input type="file" accept="image/*" @change="onFileSelected($event, 'new')" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" title="Upload Brand Logo"></div><label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Logo (Click)</label></div><div class="flex-1 w-full"><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Brand Name</label><input v-model="newBrand.name" class="w-full bg-white border border-slate-300 rounded-lg p-2.5 text-sm font-semibold focus:border-blue-500 outline-none text-slate-800 placeholder-slate-400 trans const checkTaskReminders=()=>{
    if(!currentUser.value)return;
    const now=Date.now();
    let beep=null;

    // Aggressively hunt down and delete the known "ghost" task from the database.
    const ghostTask = brandTasks.value.find(t => t.title === "Check inventory sync logs" || t.id === 't1');
    if (ghostTask) {
        delDoc('brandTasks', ghostTask.id);
        return; // Exit early this cycle, the listener will update the list
    }

    // Purge stale notifications aggressively
    activeNotifications.value = activeNotifications.value.filter(n => {
        const t = brandTasks.value.find(x => x.id === n.taskId);
        return t && !t.isCompleted && !(t.snoozeUntil && t.snoozeUntil > now);
    });

    const isAdminUser = isAdmin.value;
    const assignedBrands = currentUser.value.assignedBrandIds || [];

    brandTasks.value.forEach(t=>{
        // Skip if completed, snoozed, or not assigned to the user
        if(t.isCompleted||(t.snoozeUntil&&t.snoozeUntil>now))return;
        if(!isAdminUser && !assignedBrands.includes(t.brandId)) return;

        let dt,end=false;
        if(t.endorsementInterval){
            dt=(t.lastReminded||t.createdAt)+(t.endorsementInterval*60000);
            end=true;
        }else if(t.dueDate){
            dt=new Date(t.dueDate).getTime();
        }else return;

        const dm=Math.round((dt-now)/60000);
        if(t.remindAhead>0&&!end&&dm<=t.remindAhead&&dm>0&&!t._hasRemindedAhead){
            activeNotifications.value.push({id:'n_'+Date.now(),taskId:t.id,brandId:t.brandId,brandName:getBrandName(t.brandId),message:`Task "${t.title}" is due in ${t.remindAhead} mins!`,type:'warning',isEndorsed:end});
            beep=beep!=='critical'?'warning':'critical';
            saveDoc('brandTasks',t.id,{_hasRemindedAhead:true});
        }else if(dm<=0){
            const timeSince=t.lastReminded?(now-t.lastReminded):Infinity;
            const hasActiveNotif=activeNotifications.value.some(n=>n.taskId===t.id);
            if(timeSince>=60000||!t.lastReminded){
                if(!hasActiveNotif){
                    activeNotifications.value.push({id:'n_'+Date.now()+Math.random(),taskId:t.id,brandId:t.brandId,brandName:getBrandName(t.brandId),message:end?`Endorsed Interval met for "${t.title}"`:`Task "${t.title}" is OVERDUE!`,type:'critical',isEndorsed:end});
                }
                beep='critical';
                saveDoc('brandTasks',t.id,{lastReminded:now,_hasRemindedNow:true});
            }
        }
    });
    if(beep)playBeep(beep);
};
